name: Deploy TerrierBot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted  # <--- It lives right here in this file!
    steps:
      - name: Pull latest code
        run: |
          cd /home/ubuntu/TerrierBot
          git pull origin main

      - name: Restart PM2 Process
        run: |
          cd /home/ubuntu/TerrierBot
          ~/.npm-global/bin/pm2 restart terrierbot --update-env || pm2 restart terrierbot --update-env