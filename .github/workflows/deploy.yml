name: Deploy TerrierBot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd /home/ubuntu/TerrierBot
          git pull origin main

      - name: Restart PM2 Process
        run: |
          cd /home/ubuntu/TerrierBot
          # This forces your system to find PM2 no matter where it's hiding
          export PATH=$PATH:/home/ubuntu/.npm-global/bin
          pm2 restart terrierbot --update-env || npx pm2 restart terrierbot